version: '3'

networks:
  my_network:
    driver: bridge  # Utilisez le driver par défaut

services:
  traefik:
    image: traefik:v2.10
    networks:
      - my_network
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  auth-service:
    build:
      context: ../auth-service
    networks:
      - my_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.services.auth.loadbalancer.server.port=3000"

  billing-service:
    build:
      context: ../billing-service
    networks:
      - my_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.billing.rule=PathPrefix(`/billing`)"
      - "traefik.http.services.billing.loadbalancer.server.port=3000"

  user-service:
    build:
      context: ../user-service
    networks:
      - my_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user.rule=PathPrefix(`/user`)"
      - "traefik.http.services.user.loadbalancer.server.port=3000"

  mail-service:
    build:
      context: ../mail-service
    networks:
      - my_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mail.rule=PathPrefix(`/mail`)"
      - "traefik.http.services.mail.loadbalancer.server.port=3000"

  rabbitmq:
    image: rabbitmq:4.0-management
    networks:
      - my_network
    ports:
      - "5672:5672"
      - "15672:15672"
#    environment:
#      RABBITMQ_DEFAULT_USER: user
#      RABBITMQ_DEFAULT_PASS: password
    restart: always
